train_script: scripts/record_video.py

# M2 录制配置 — 与 phase2.yaml 训练参数对齐.
# 用法:
#   python scripts/train_hydra.py --multirun experiment@train=record_m2
#   python scripts/train_hydra.py --multirun experiment@train=record_m2 \
#       train.agent_path=results/my_m2_agent.msh train.n_episodes=8

# --- agent ---
agent_path: results/best_agent_M2_axis02.msh

# --- env (必须与 phase2 训练时一致) ---
num_envs: 2
use_axis_resid_obs: true
preinsert_success_pos_threshold: 0.10
rew_success: 2.0
rew_home: 0.0005
home_weights: "1,1,1,1,0.75,0.5,0.5"
rew_axis: 0.5
success_axis_threshold: 0.50
rew_pos_success: 1.0
axis_gate_radius: 0.40
# terminal_hold_bonus 不传: 脚本内部强制为 0, 确保 episode 不在成功瞬间截断.
hold_success_steps: 10

# --- 录制参数 ---
n_episodes: 4
viz_env_idx: 0
output_dir: results/videos
fps: 30
width: 1280
height: 720
tag: M2
