train_script: scripts/train_sac_lagrangian.py

# Stage 1 (Lagrangian SAC): pos-only, 34-dim obs, collision → cost constraint.
# Axis reward disabled; success = pos_err < preinsert_success_pos_threshold.
# Reward function: DualArmPegHoleCostEnv.reward() — no large collision penalty,
# collision handled entirely by Lagrange multiplier λ and cost critic Q_C.

num_envs: 16
render: false
seed: 4
use_axis_resid_obs: true
n_epochs: 100
n_steps_per_epoch: 1024
n_steps_per_fit: null
utd: null

lr_actor: 1e-4
lr_critic: 3e-4
lr_alpha: 3e-4
alpha_max: 0.05
target_entropy: -7
n_eval_episodes: 16

initial_joint_noise: null
preinsert_success_pos_threshold: 0.10
preinsert_offset: null
rew_action: null
rew_home: 0.0005
rew_axis: 0.0
success_axis_threshold: .inf
terminal_hold_bonus: 0.0
hold_success_steps: 10

# Sphere-proxy 兜底: clearance_hard=0.0 = 球壳一接触即触发 hard absorbing.
clearance_hard: 0.0

# --------------------------------------------------------------------------
# Lagrangian 专属参数
# --------------------------------------------------------------------------

# cost_limit: per-step collision 预算（per-step 触发率上限）.
#
# 标定方法:
#   1. 先用 SAC phase1.yaml 跑 64-episode eval（或直接用已有 best_agent_sac.msh）.
#   2. 记录 wandb 的 absorb_sphere_per_epoch 和 n_steps_per_epoch.
#      per-step collision rate = absorb_sphere_per_epoch / n_steps_per_epoch
#   3. 取该值的 0.5 倍作为 cost_limit（收紧一半，留余量给 λ 调节）.
#
# 占位值 0.02 = 2% per-step collision rate，对应约每 50 步触发一次.
# SAC baseline eval 后请更新此值.
cost_limit: 0.02  # TODO: 用 SAC baseline eval 结果标定

# Lagrange 乘子学习率. 1e-3~1e-4，通常比 lr_actor 低一个量级.
# λ 更新 per fit step，不受 critic_warmup_transitions 影响（λ 在 warmup 期冻结）.
lr_lambda: 1e-3

# λ 的 clamp 上限. λ 冲到几百会把 actor 完全锁死（actor loss 被 λ·Q_C 主导）.
# 如果训练中 λ 持续上升到 lambda_max，说明 cost_limit 设得过低.
lambda_max: 100.0

# log_λ 初值，默认 0 → λ_init = 1.0.
# 若已知 Stage 1 collision rate 偏高，可设 1.5~2.0（λ≈4.5~7.4）跳过早期爬升.
init_log_lambda: 0.0

# cost MDP 折扣. null = 使用 env γ (0.99). 设 1.0 = average-cost 形式.
# average-cost 时 cost_limit 直接是 Q_C 量纲（期望累计 cost），而非 per-step.
gamma_cost: null

# --------------------------------------------------------------------------

wandb_project: bimanual_peghole
wandb_run_name: phase1_lag_seed4
wandb_group: phase1_lag_seed_sweep
no_wandb: false
