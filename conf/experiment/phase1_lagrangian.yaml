train_script: scripts/train_sac_lagrangian.py

# Stage 1 Lagrangian SAC — position-only cold-start config.
#
# reward = -w_pos×pos_err + w_success×1[pos_ok] - w_action×a² - w_home×dev²
# cost   = collision indicator → Lagrangian λ·Q_C 约束
#
# 位置-only 语义:
#   - rew_axis=0.0
#   - success_axis_threshold=inf
#   - use_axis_resid_obs=True 仍保留 34 维 obs，方便和后续 Stage 2 对齐。

# --------------------------------------------------------------------------
# 运行环境
# --------------------------------------------------------------------------
num_envs: 16
render: false
seed: 42
use_axis_resid_obs: true   # 34 维 obs (axis_resid 替换 axis_dot)

# --------------------------------------------------------------------------
# 训练节奏
# --------------------------------------------------------------------------
n_epochs: 100
n_steps_per_epoch: 2400
n_steps_per_fit: null      # 默认 = num_envs (每 vector-step fit 一次)
utd: null                  # 默认 = n_steps_per_fit → true_UTD ≈ 1
n_eval_episodes: 16

# 默认 = INITIAL_REPLAY_SIZE (10000): replay 填满后立即开始 actor/α/λ 更新。
critic_warmup_transitions: null

# --------------------------------------------------------------------------
# 学习率与 entropy
# --------------------------------------------------------------------------
lr_actor: 1e-4
lr_critic: 3e-4
lr_alpha: 3e-4
alpha_max: 0.05
target_entropy: -7

# --------------------------------------------------------------------------
# env 参数
# --------------------------------------------------------------------------
initial_joint_noise: null  # 默认 0.1 rad (父类)
preinsert_success_pos_threshold: 0.10
preinsert_offset: null     # 默认 0.05 m (父类)

rew_pos: 1.0
rew_axis: 0.0
rew_success: 2.0
rew_action: 0.005
rew_home: 0.0005

success_axis_threshold: inf

# hold_success_steps: 仅影响 eval 指标 (compute_hold_metrics), 不影响训练 reward
hold_success_steps: 10

# Sphere-proxy 自碰撞兜底 (PhysX 1-5cm 失明区补丁, 全 stage 通用):
#   clearance_hard=0.0 = 球壳一接触即触发 hard absorbing (与 PhysX 力检测 OR).
#   proxy_arm_radius: iiwa link 段球半径 0.06m (link 直径 ~6-10cm, 带 margin).
#   proxy_ee_radius:  coupler + hande_link 段球半径 0.04m (更紧凑但也更宽).
# 关闭请设 clearance_hard: -.inf (注意负数会走 --clearance_hard=-.inf 形式).
clearance_hard: 0.0
proxy_arm_radius: 0.06
proxy_ee_radius: 0.04

# --------------------------------------------------------------------------
# Lagrangian 专属
# --------------------------------------------------------------------------

# cost_limit: per-step collision 预算（per-step 触发率上限）.
#
# 标定方法:
#   1. 先用 SAC phase1.yaml 跑 64-episode eval（或直接用已有 best_agent_sac.msh）.
#   2. 记录 wandb 的 absorb_sphere_per_epoch 和 n_steps_per_epoch.
#      per-step collision rate = absorb_sphere_per_epoch / n_steps_per_epoch
#   3. 取该值的 0.5 倍作为 cost_limit（收紧一半，留余量给 λ 调节）.
#
# 占位值 0.02 = 2% per-step collision rate，对应约每 50 步触发一次.
# SAC baseline eval 后请更新此值.
cost_limit: 0.02  # TODO: 用 SAC baseline eval 结果标定

# λ 响应延迟修复:
# - max_recent_replay: 最新采样块出现 collision 时立即参与 λ 更新, 不等 replay 随机采样命中.
# - lr_lambda=5e-4 比 1e-4 更快响应持续超预算，同时比早期 1e-3 温和。
lambda_update_mode: max_recent_replay
lr_lambda: 5e-4

# λ 的 clamp 上限. λ 冲到几百会把 actor 完全锁死（actor loss 被 λ·Q_C 主导）.
# 如果训练中 λ 持续上升到 lambda_max，说明 cost_limit 设得过低.
lambda_max: 100.0
lambda_min: 0.05           # 防止 cost=0 时 λ 指数衰减为零、安全信号消失

# log_λ 初值，默认 0 → λ_init = 1.0.
# 若已知 Stage 1 collision rate 偏高，可设 1.5~2.0（λ≈4.5~7.4）跳过早期爬升.
init_log_lambda: 0.0

# cost MDP 折扣. null = 使用 env γ (0.99). 设 1.0 = average-cost 形式.
# average-cost 时 cost_limit 直接是 Q_C 量纲（期望累计 cost），而非 per-step.
gamma_cost: null

# actor_grad_clip: 防止 actor 首次更新梯度爆炸 (冷启动 critic 早期噪声大)
actor_grad_clip: 1.0

# --------------------------------------------------------------------------

wandb_project: bimanual_peghole
wandb_entity: safe_rl_2026_lund
wandb_run_name: lag_phase1_seed42
wandb_group: phase1_lag
no_wandb: false
