train_script: scripts/train_sac_lagrangian.py

# Stage 2 Lagrangian SAC — 冷启动配置
#
# 设计原则（见 envs/dual_arm_peg_hole_cost_env.py）:
#   reward = -w_pos×pos_err - w_axis×axis_err + w_axis_progress×progress
#            + w_success×1[ok] - w_action×a² - w_home×dev²
#   cost   = collision indicator → Lagrangian λ·Q_C 约束
#
# 移除的遗留补丁 (与 warm-start 时代的 phase2 配置相比):
#   - rew_pos_success  : Stage 1→2 暖启动桥接信号
#   - axis_gate_radius : 暖启动补丁，防 axis 项干扰已收敛位置
#   - home_weights     : 非对称手腕权重 (1,1,1,1,0.75,0.5,0.5)
#   - terminal_hold_bonus / hold-N absorbing
#   - critic_warmup_transitions 50000 (≈39 epoch 冻结 actor → 解冻时梯度爆炸)

# --------------------------------------------------------------------------
# 运行环境
# --------------------------------------------------------------------------
num_envs: 16
render: false
seed: 42
use_axis_resid_obs: true   # 34 维 obs (axis_resid 替换 axis_dot), 全程光滑

# --------------------------------------------------------------------------
# 训练节奏
# --------------------------------------------------------------------------
n_epochs: 200
n_steps_per_epoch: 2400
n_steps_per_fit: null      # 默认 = num_envs (每 vector-step fit 一次)
utd: null                  # 默认 = n_steps_per_fit → true_UTD ≈ 1
n_eval_episodes: 16

# critic_warmup_transitions: 冷启动不需要长时间冻结 actor.
# 默认 = INITIAL_REPLAY_SIZE (10000) = replay 填充后立即开始全部更新.
critic_warmup_transitions: null

# --------------------------------------------------------------------------
# 学习率与 entropy
# --------------------------------------------------------------------------
# 冷启动双目标任务: lr_actor 用 1e-4 (Stage 1 冷启动同款).
# target_entropy=-7 (=-act_dim/2): 引导 SAC 略倾向集中，加速早期收敛.
lr_actor: 1e-4
lr_critic: 3e-4
lr_alpha: 3e-4
alpha_max: 0.2             # 冷启动需要更多探索 (Stage 1 cold-start 同款)
target_entropy: -7

# --------------------------------------------------------------------------
# env 参数
# --------------------------------------------------------------------------
initial_joint_noise: null  # 默认 0.1 rad (父类)
preinsert_success_pos_threshold: 0.10
preinsert_offset: null     # 默认 0.05 m (父类)

# Stage 2 干净 reward 权重
# 量纲平衡 @ home: pos_err≈0.5m → 贡献-0.5; axis_err≈2.0 → 贡献-1.0; 两项相近
# axis_progress=clamp(1-axis_err/2,0,1): 同向≈0, 完美反向对齐=1.
# rew_axis_progress=0.5 时, 轴项从 far 的 -1.0 渐进到 perfect 的 +0.5.
rew_pos: 1.0
rew_axis: 0.5
rew_axis_progress: 0.5
rew_success: 2.0
rew_action: 0.005
rew_home: 0.001

# success 定义: pos_err<0.10m AND axis_err<0.30 (1+dot<0.30 → 偏离理想±46°)
# 0.50 (±60°) 过松: bonus 在轴仍严重偏斜时触发, 策略不需要真正对齐.
# 0.30 是冷启动合理起点: 比 home(axis_err≈2.0) 严格 6×, 但仍可合理触发.
# eval 阶段如需更严格验收, 另行传 --success_axis_threshold 0.20 覆盖.
success_axis_threshold: 0.50

# hold_success_steps: 仅影响 eval 指标 (compute_hold_metrics), 不影响训练 reward
hold_success_steps: 10

# Sphere-proxy 自碰撞兜底: clearance_hard=0.0 = 球壳一接触即触发 hard absorbing
clearance_hard: 0.0

# --------------------------------------------------------------------------
# Lagrangian 专属
# --------------------------------------------------------------------------
# rollout_episode_rate: cost_limit = 每集平均碰撞次数.
# collision 是 terminal 且每集最多一次时, 0.10 ≈ 允许 10% episode 碰撞.
# λ 用当前 stochastic rollout 中完成的真实 episode cost 更新, 不使用 replay batch、
# deterministic eval 或 Mushroom flattened dataset.last.
cost_limit: 0.10

# rollout_episode_rate 比 eval-based episode_rate 少一层滞后, 且与训练 policy 分布一致.
lambda_update_mode: rollout_episode_rate
lr_lambda: 5e-2
lambda_max: 100.0
lambda_min: 0.05           # 防止 cost=0 时 λ 指数衰减为零、安全信号消失

# init_log_lambda=0 → λ_init=1. 冷启动无遗留 λ 状态，从 1 开始合理.
init_log_lambda: 2
gamma_cost: null

# actor_grad_clip: 防止 actor 首次更新梯度爆炸 (冷启动 critic 早期噪声大)
actor_grad_clip: 1.0

# --------------------------------------------------------------------------
# 可选从已有 checkpoint 续训 — 冷启动请保持以下两行注释
# --------------------------------------------------------------------------
# load_agent: results/best_agent_lag.msh
# actor_only_warmstart: true
keep_replay: false

# --------------------------------------------------------------------------
# wandb
# --------------------------------------------------------------------------
wandb_project: bimanual_peghole
wandb_entity: safe_rl_2026_lund
wandb_run_name: lag_stage2_coldstart_axis_claude
wandb_group: null
no_wandb: false
