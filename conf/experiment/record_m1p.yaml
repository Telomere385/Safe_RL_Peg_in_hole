train_script: scripts/record_video.py

# M1' 录制配置 — 与 phase1.yaml 训练参数对齐.
# 用法:
#   python scripts/train_hydra.py --multirun experiment@train=record_m1p
#   python scripts/train_hydra.py --multirun experiment@train=record_m1p \
#       train.agent_path=results/my_custom_agent.msh train.n_episodes=8

# --- agent ---
agent_path: results/best_agent.msh

# --- env (必须与 phase1 训练时一致) ---
num_envs: 2              # cloner bug 要求 >= 2; 录制只用 viz_env_idx=0
use_axis_resid_obs: true
preinsert_success_pos_threshold: 0.10
rew_home: 0.0005
# terminal_hold_bonus 不传: 脚本内部强制为 0, 确保 episode 不在成功瞬间截断.
hold_success_steps: 10
# M1' 不启用 axis reward / axis threshold (保持 env 默认)
# rew_axis: 0.0 (env 默认)
# success_axis_threshold: inf (env 默认)

# --- 录制参数 ---
n_episodes: 4
viz_env_idx: 0
output_dir: results/videos
fps: 30
width: 1280
height: 720
tag: M1p
